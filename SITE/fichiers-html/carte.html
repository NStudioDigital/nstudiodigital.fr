<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nadège Dufour — N/ Studio Digital</title>
<meta name="robots" content="noindex, nofollow"/>
<meta property="og:title" content="Nadège Dufour — N/ Studio Digital"/>
<meta property="og:description" content="Directrice Créative — N/ Studio Digital. Sites vitrines pour coiffeurs et professionnels du bien-être à Lyon."/>
<meta property="og:image" content="https://www.nstudiodigital.fr/ogcarte.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:url" content="https://www.nstudiodigital.fr/carte.html"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://www.nstudiodigital.fr/ogcarte.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--black:#0D0D0D;--white:#FFFFFF;--gray-mid:#888888;--gray-lt:#CCCCCC;--gray-bg:#F4F4F4;--sage:#7A9478;--font:'Inter',sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
  .wrap{display:flex;flex-direction:column;align-items:center;width:100%;}
  .card{width:100%;max-width:380px;background:var(--gray-bg);border-radius:24px;padding:48px 32px 36px;text-align:center;}
  .logo{font-size:22px;color:var(--black);margin-bottom:28px;letter-spacing:-.2px;}
  .logo .slash{color:var(--sage);font-weight:300;}
  .name{font-size:24px;font-weight:500;color:var(--black);letter-spacing:.5px;margin-bottom:6px;}
  .role{font-size:12px;font-weight:600;color:var(--sage);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px;}
  .divider{width:32px;height:1px;background:var(--gray-lt);margin:0 auto 28px;}
  .info{display:flex;flex-direction:column;gap:14px;margin-bottom:32px;}
  .info a{display:flex;align-items:center;justify-content:center;gap:9px;font-size:14px;color:var(--black);text-decoration:none;}
  .info .ic{width:26px;height:26px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
  .tagline{font-size:10px;font-weight:500;color:var(--gray-mid);letter-spacing:1.5px;text-transform:uppercase;line-height:1.6;}
  .actions{width:100%;max-width:380px;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:100px;font-family:var(--font);font-size:14px;font-weight:500;text-decoration:none;transition:transform .2s,opacity .2s;}
  .btn-main{background:var(--white);color:var(--black);}
  .btn-main:hover{transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2);}
  .btn-ghost:hover{border-color:rgba(255,255,255,.5);color:#fff;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">N<span class="slash">/</span> Studio Digital</div>
      <div class="name">Nadège Dufour</div>
      <div class="role">Directrice Créative</div>
      <div class="divider"></div>
      <div class="info">
        <a href="tel:+33668904411"><span class="ic">📞</span> 06 68 90 44 11</a>
        <a href="mailto:contact@nstudiodigital.fr"><span class="ic">✉️</span> contact@nstudiodigital.fr</a>
      </div>
      <div class="tagline">Des sites qui travaillent.<br/>Des résultats qui comptent.</div>
    </div>
    <div class="actions">
      <a href="nadege-dufour.vcf" class="btn btn-main" download>Ajouter aux contacts</a>
      <a href="https://www.nstudiodigital.fr/" class="btn btn-ghost" target="_blank" rel="noopener">Voir le site →</a>
    </div>
  </div>
</body>
</html>
