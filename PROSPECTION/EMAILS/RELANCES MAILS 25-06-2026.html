function copyEmail(btn, i) {
  const e = emails[i];
  const PS = "P.S. N'hésitez pas à me signaler si le moment n'est pas opportun.";
  const RDV = "Si vous souhaitez en savoir plus, vous pouvez prendre directement un rendez-vous de 30 minutes sur mon site : nstudiodigital.fr/#contact";

    btn.textContent = 'Copié !';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = "Copier l'email complet";
      btn.classList.remove('copied');
